<div class="p-6 max-w-7xl mx-auto space-y-6">
    
    <!-- Optional Title Component or Section Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-taupe-900 tracking-tight">Datacenter Infrastructure</h1>
            <p class="text-sm text-taupe-600">Real-time geographic distribution and sensor metrics overview</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-dusty-olive-100 text-dusty-olive-800">
                System Active
            </span>
        </div>
    </div>

    <!-- Main Grid Layout: Map Left (60%), Stacked Charts Right (40%) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
        
        <!-- Left Column: Leaflet Map (Spans 7 cols on large screens) -->
        <div class="lg:col-span-7 bg-white rounded-xl shadow-sm border border-taupe-200 p-4 flex flex-col h-[600px]">
            <h2 class="text-base font-semibold text-taupe-800 mb-3">Facility Locations</h2>
            <!-- Map Container -->
            <div id="map" class="w-full flex-1 rounded-lg z-0"></div>
        </div>

        <!-- Right Column: Two Stacked ECharts (Spans 5 cols on large screens) -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            
            <!-- Chart 1: Temperature / Metric 1 -->
            <div class="bg-white rounded-xl shadow-sm border border-taupe-200 p-4 flex flex-col h-[288px]">
                <h3 class="text-sm font-semibold text-taupe-800 mb-2">Average Ambient Temperature</h3>
                <div id="chart-temp" class="w-full flex-1"></div>
            </div>

            <!-- Chart 2: Power Load / Metric 2 -->
            <div class="bg-white rounded-xl shadow-sm border border-taupe-200 p-4 flex flex-col h-[288px]">
                <h3 class="text-sm font-semibold text-taupe-800 mb-2">Rack Power Utilization (kW)</h3>
                <div id="chart-power" class="w-full flex-1"></div>
            </div>

        </div>

    </div>
</div>

<!-- Map and Chart Initialization Script -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // 1. Initialize Leaflet Map (Centered on Colorado Springs region)
        const map = L.map('map').setView([38.8339, -104.8214], 12);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Example marker for a datacenter node
        L.marker([38.8339, -104.8214]).addTo(map)
            .bindPopup('<b>Co Springs Primary DC</b><br/>Status: Nominal');

        // Force Leaflet to recalculate dimensions if rendered dynamically via HTMX
        setTimeout(() => { map.invalidateSize(); }, 200);

        // 2. Initialize Apache EChart 1 (Temperature)
        const tempChart = echarts.init(document.getElementById('chart-temp'));
        const tempOption = {
            grid: { top: 20, right: 20, bottom: 25, left: 40, containLabel: true },
            tooltip: { trigger: 'axis' },
            xAxis: { 
                type: 'category', 
                data: ['12:00', '13:00', '14:00', '15:00', '16:00'],
                axisLine: { lineStyle: { color: '#a39b93' } }
            },
            yAxis: { 
                type: 'value', 
                splitLine: { lineStyle: { color: '#f0ece6' } }
            },
            series: [{
                data: [21.5, 22.0, 23.1, 22.4, 21.8],
                type: 'line',
                smooth: true,
                color: '#c25e38' // Matches cinnamon-wood tone
            }]
        };
        tempChart.setOption(tempOption);

        // 3. Initialize Apache EChart 2 (Power Load)
        const powerChart = echarts.init(document.getElementById('chart-power'));
        const powerOption = {
            grid: { top: 20, right: 20, bottom: 25, left: 40, containLabel: true },
            tooltip: { trigger: 'axis' },
            xAxis: { 
                type: 'category', 
                data: ['12:00', '13:00', '14:00', '15:00', '16:00'],
                axisLine: { lineStyle: { color: '#a39b93' } }
            },
            yAxis: { 
                type: 'value',
                splitLine: { lineStyle: { color: '#f0ece6' } }
            },
            series: [{
                data: [120, 132, 145, 138, 142],
                type: 'bar',
                itemStyle: { color: '#6d755d' }, // Matches dusty-olive tone
                barWidth: '50%'
            }]
        };
        powerChart.setOption(powerOption);

        // Responsive resize handler for charts
        window.addEventListener('resize', () => {
            tempChart.resize();
            powerChart.resize();
        });
    });
</script>
