name: build

on: 
  pull_request:
    branches:
      - main

jobs:
  build:

    name: Build Infra Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # for gh packages
    
    steps:
      - name: checkout repo
        uses:  actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set Image Metadata
        id: meta
        run: |
          echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_TAG=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_ENV 

      - name: Build + Push Postgres Image
        run: |
          docker build -t ghcr.io/${{ env.REPO_OWNER }}/sensor-postgres:${{ env.IMAGE_TAG }} -t ghcr.io/${{ env.REPO_OWNER }}/sensor-postgres:latest postgres
          docker push ghcr.io/${{ env.REPO_OWNER }}/sensor-postgres --all-tags

      - name: Output Image URLs
        run: |
          echo "Postgres: ghcr.io/${{ env.REPO_OWNER }}/sensor-postgres:${{ env.IMAGE_TAG }}"